<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>

    <meta http-equiv="refresh" content="0; url=https://deboananet.club/inicio?ip=$(ip)&mac=$(mac)&router=fortaleza">

    <style>
        body {
            background-color: #f8f9fa;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-top: 20vh;
            margin: 0;
        }

        h2 {
            color: #333;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Conectando ao Wi-Fi...</h2>
    <p>Aguarde, estamos preparando os planos para você.</p>

    <a href="https://deboananet.club/inicio?ip=$(ip)&mac=$(mac)&router=fortaleza" class="btn">Continuar para a
        Internet</a>

    <script type="text/javascript">
        setTimeout(function () {
            var mikrotikIp = "$(ip)";
            var mikrotikMac = "$(mac)";
            var macLimpo = encodeURIComponent(mikrotikMac);
            var ipLimpo = encodeURIComponent(mikrotikIp);
            window.location.replace("https://deboananet.club/inicio?ip=" + ipLimpo + "&mac=" + macLimpo + "&router=fortaleza");
        }, 500); 
    </script>
</body>

</html>
